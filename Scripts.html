<script>
    let cacheFilaBase = [], cacheFilaFiltrada = [], cacheLogsBase = { colunas: [], linhas: [], isHtml: false }, cacheLoteParsed = [];
    let colunaOrdenacao = 'etapaNum', ordemAscendente = true, currentPage = 1, rowsPerPage = 50, selectionSet = new Set(); 
    let currentLogPage = 1, rowsPerLogPage = 50, cacheLogsFiltrados = [];

    function dispararEmailBackendPromise(grupo, responsavel) { return new Promise((resolve, reject) => { google.script.run.withSuccessHandler(res => resolve(res)).withFailureHandler(err => reject(err)).dispararEmailAgrupadoWeb([grupo], responsavel); }); }

    function carregarDashboard() {

      google.script.run.withSuccessHandler(stats => {
        document.getElementById('loading-dash').classList.add('hidden'); if(stats && stats.erro) return aviso("Aviso BI: " + stats.erro); window.currentStats = stats; 
        document.getElementById('kpi-pendentes').innerText = stats.kpis.pendentesTotal; document.getElementById('kpi-pend-e1').innerText = stats.kpis.pendentesEtapa['1']; document.getElementById('kpi-pend-e2').innerText = stats.kpis.pendentesEtapa['2']; document.getElementById('kpi-pend-e3').innerText = stats.kpis.pendentesEtapa['3'];
        document.getElementById('kpi-email-total').innerText = stats.kpis.emails.total; document.getElementById('kpi-email-hoje').innerText = stats.kpis.emails.hoje; document.getElementById('kpi-email-sem').innerText = stats.kpis.emails.semana; document.getElementById('kpi-email-mes').innerText = stats.kpis.emails.mes;
        document.getElementById('kpi-whats-total').innerText = stats.kpis.whats.total; document.getElementById('kpi-whats-hoje').innerText = stats.kpis.whats.hoje; document.getElementById('kpi-whats-sem').innerText = stats.kpis.whats.semana; document.getElementById('kpi-whats-mes').innerText = stats.kpis.whats.mes;
        document.getElementById('kpi-concluidos').innerText = stats.kpis.conclusaoTotal; document.getElementById('kpi-conc-e1').innerText = stats.kpis.conclusaoEtapa['1']; document.getElementById('kpi-conc-e2').innerText = stats.kpis.conclusaoEtapa['2']; document.getElementById('kpi-conc-e3').innerText = stats.kpis.conclusaoEtapa['3'];
        const isDark = document.documentElement.classList.contains('dark'), gridColor = isDark ? '#334155' : '#e2e8f0', textColor = isDark ? '#94a3b8' : '#64748b'; Chart.defaults.color = textColor; Chart.defaults.borderColor = gridColor;
        if(window.cHistorico) window.cHistorico.destroy(); const labelsHist = Object.keys(stats.graficos.historicoMensal).sort((a,b) => stats.graficos.historicoMensal[a].sortKey - stats.graficos.historicoMensal[b].sortKey); window.cHistorico = new Chart(document.getElementById('chartHistorico').getContext('2d'), { type: 'line', data: { labels: labelsHist, datasets: [{ label: 'E-mails', data: labelsHist.map(k => stats.graficos.historicoMensal[k].email), borderColor: '#3b82f6', backgroundColor: 'rgba(59, 130, 246, 0.1)', borderWidth: 3, fill: true, tension: 0.4 },{ label: 'WhatsApps', data: labelsHist.map(k => stats.graficos.historicoMensal[k].whats), borderColor: '#10b981', backgroundColor: 'rgba(16, 185, 129, 0.1)', borderWidth: 3, fill: true, tension: 0.4 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'top' } }, scales: { y: { beginAtZero: true, grid: { color: gridColor } }, x: { grid: { display: false } } } } });
        if(window.cEnviosEtapa) window.cEnviosEtapa.destroy(); window.cEnviosEtapa = new Chart(document.getElementById('chartEnviosEtapa').getContext('2d'), { type: 'bar', data: { labels: ['E1 (Boas Vindas)', 'E2 (Alerta 5D)', 'E3 (Expirado)'], datasets: [{ label: 'E-mails', data: [stats.kpis.emails.etapa['1'], stats.kpis.emails.etapa['2'], stats.kpis.emails.etapa['3']], backgroundColor: '#3b82f6', borderRadius: 4 },{ label: 'WhatsApps', data: [stats.kpis.whats.etapa['1'], stats.kpis.whats.etapa['2'], stats.kpis.whats.etapa['3']], backgroundColor: '#10b981', borderRadius: 4 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'top' } }, scales: { y: { beginAtZero: true, grid: { color: gridColor } }, x: { grid: { display: false } } } } });
        if(window.cPendentes) window.cPendentes.destroy(); window.cPendentes = new Chart(document.getElementById('chartPendentes').getContext('2d'), { type: 'doughnut', data: { labels: ['E1 (Boas Vindas)', 'E2 (Alerta 5D)', 'E3 (Expirado)'], datasets: [{ data: [stats.kpis.pendentesEtapa['1'], stats.kpis.pendentesEtapa['2'], stats.kpis.pendentesEtapa['3']], backgroundColor: ['#6366f1', '#f59e0b', '#f43f5e'], borderWidth: 0, hoverOffset: 4 }] }, options: { responsive: true, maintainAspectRatio: false, cutout: '70%', plugins: { legend: { position: 'bottom' } } } });
        if(window.cConclusao) window.cConclusao.destroy(); window.cConclusao = new Chart(document.getElementById('chartConclusao').getContext('2d'), { type: 'pie', data: { labels: ['E1 (Boas Vindas)', 'E2 (Alerta 5D)', 'E3 (Expirado)'], datasets: [{ data: [stats.kpis.conclusaoEtapa['1'], stats.kpis.conclusaoEtapa['2'], stats.kpis.conclusaoEtapa['3']], backgroundColor: ['#8b5cf6', '#0ea5e9', '#ec4899'], borderWidth: 0, hoverOffset: 4 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } } });
        if(window.cEquipe) window.cEquipe.destroy(); window.cEquipe = new Chart(document.getElementById('chartEquipe').getContext('2d'), { type: 'bar', data: { labels: Object.keys(stats.graficos.equipeMes), datasets: [{ data: Object.values(stats.graficos.equipeMes), backgroundColor: '#64748b', borderRadius: 4 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { grid: { color: gridColor } }, x: { grid: { display: false } } } } });
      }).solicitarDadosWeb('dashboard');
    }

    function gerarApresentacaoSlides() {
      aviso("⏳ Capturando gráficos e gerando Google Slides...", 60000);
      const graficosParaExportar = [{ titulo: 'Evolução Mensal', base64: document.getElementById('chartHistorico').toDataURL('image/png') }, { titulo: 'Envios por Etapa', base64: document.getElementById('chartEnviosEtapa').toDataURL('image/png') }, { titulo: 'Veículos Pendentes', base64: document.getElementById('chartPendentes').toDataURL('image/png') }, { titulo: 'Desempenho de Equipe', base64: document.getElementById('chartEquipe').toDataURL('image/png') }];
      google.script.run.withSuccessHandler(res => { if(res.erro) return aviso("❌ Erro ao gerar slides: " + res.erro); aviso(`✅ Apresentação gerada!`, 5000); window.open(res.url, '_blank'); }).exportarDashboardParaSlidesWeb(graficosParaExportar, window.currentStats);
    }

    function formatarMoedaBRL(valor) { if (!valor) return 'Sem FIPE'; let str = String(valor).replace(/R\$\s?/gi, '').trim(); if (str === '') return 'Sem FIPE'; if (str.indexOf(',') > -1) { str = str.replace(/\./g, '').replace(',', '.'); } let num = parseFloat(str); if (isNaN(num)) return '💰 R$ ' + String(valor).replace(/R\$\s?/gi, '').trim(); return '💰 R$ ' + new Intl.NumberFormat('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(num); }
    function gerarLinkWhats(telefone, mensagem) { if (!telefone) return `<span class="text-slate-400 text-[10px] italic">Sem Whats</span>`; const num = String(telefone).replace(/\D/g, ''); const msg = encodeURIComponent(mensagem || ""); return `<a href="https://wa.me/55${num}?text=${msg}" target="_blank" class="text-emerald-600 dark:text-emerald-400 hover:text-emerald-700 font-bold text-[11px] flex items-center gap-1 mt-1 transition"><span class="text-sm">💬</span> WhatsApp</a>`; }
    function getTimestamp(dataStr) { if (!dataStr || dataStr === "Aguardando..." || dataStr === "") return 0; const partes = dataStr.split(" "), d = partes[0].split("/"), t = partes[1] ? partes[1].split(":") : [0, 0]; return new Date(d[2], d[1] - 1, d[0], t[0] || 0, t[1] || 0).getTime(); }
    function abrirNovaAba(view) { if(APP_URL && APP_URL !== "") window.open(APP_URL + "?view=" + view, "_blank"); else aviso("⚠️ Erro: Acesse pelo link oficial."); }
    function toggleMenu(id, event) { event.stopPropagation(); const menu = document.getElementById(id); const isHidden = menu.classList.contains('hidden'); document.querySelectorAll('.menu-flutuante').forEach(el => el.classList.add('hidden')); if (isHidden) menu.classList.remove('hidden'); }
    document.addEventListener('click', () => { document.querySelectorAll('.menu-flutuante').forEach(el => el.classList.add('hidden')); });
    function toggleDarkMode() { document.documentElement.classList.toggle('dark'); const isDark = document.documentElement.classList.contains('dark'); localStorage.setItem('theme', isDark ? 'dark' : 'light'); document.getElementById('theme-icon').innerText = isDark ? '☀️' : '🌙'; }
    function aviso(texto, tempo = 5000, isHtml = false) { const el = document.getElementById("toast"); if (isHtml) el.innerHTML = texto; else el.innerText = texto; el.classList.remove("hidden"); if (tempo > 0) setTimeout(() => el.classList.add("hidden"), tempo); }

    function imprimirTabela(titulo, cabecalhos, linhasHTML) {
       const w = window.open('', '_blank');
       const htmlContent = '<!DOCTYPE html><html><head><title>Relatório - ' + titulo + '</title><style>body { padding: 20px; font-family: sans-serif; background: white; color: black; } @media print { body { padding: 0; } @page { margin: 1cm; size: landscape; } } table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 11px; text-align: left; } th, td { border: 1px solid #ccc; padding: 6px 10px; } th { background-color: #f1f5f9; font-weight: bold; color: #334155; text-transform: uppercase; font-size: 10px; } td { vertical-align: top; } h1 { font-size: 20px; font-weight: bold; margin-bottom: 4px; } p { color: #666; font-size: 12px; margin-bottom: 20px; }</style></head><body><h1>Relatório Operacional: ' + titulo + '</h1><p>Gerado em: ' + new Date().toLocaleString('pt-BR') + '</p><table><thead><tr>' + cabecalhos.map(c => '<th>' + c + '</th>').join('') + '</tr></thead><tbody>' + linhasHTML + '</tbody></table></body></html>';
       w.document.write(htmlContent); w.document.close(); w.setTimeout(function() { w.print(); w.close(); }, 800);
    }
    function dispararImpressaoFila() {
       if (cacheFilaFiltrada.length === 0) return aviso("⚠️ Nenhum dado na tabela para imprimir.");
       const cabecalhos = ["Etapa", "Cliente", "Veículo / FIPE", "Data Entrada", "Data Envio", "Contato", "Localização", "Fipe Baixa", "Resp. Email", "Resp. Whats"];
       const linhasHTML = cacheFilaFiltrada.map(cli => { let fipeDisplay = formatarMoedaBRL(cli.fipe).replace('💰 ', ''); let veiculoDisplay = cli.placa ? cli.placa : (cli.chassi ? cli.chassi : "-"); return '<tr><td style="text-align:center; font-weight:bold;">' + (cli.etapaNum === 1 ? "Boas Vindas" : cli.etapaNum === 2 ? "Alerta 5d" : "Prazo Exp") + '</td><td style="font-weight:bold;">' + (cli.nome || "-") + '</td><td>' + veiculoDisplay + '<br><span style="color:#10b981; font-weight:bold;">' + fipeDisplay + '</span></td><td>' + cli.dataPlanilha + '</td><td>' + (cli.dataEnvio || "Aguardando...") + '</td><td>' + (cli.email || "-") + '<br>' + (cli.telefone || "-") + '</td><td><b>' + (cli.estado || "N/A") + '</b><br><span>' + (cli.cidade || "") + '</span></td><td style="text-align:center; ' + (cli.isFipeBaixa ? 'color:red; font-weight:bold;' : '') + '">' + (cli.isFipeBaixa ? 'SIM' : 'NÃO') + '</td><td style="text-align:center; ' + (cli.isRespondeuEmail ? 'color:green; font-weight:bold;' : '') + '">' + (cli.isRespondeuEmail ? 'SIM' : 'NÃO') + '</td><td style="text-align:center; ' + (cli.isRespondeuWhats ? 'color:green; font-weight:bold;' : '') + '">' + (cli.isRespondeuWhats ? 'SIM' : 'NÃO') + '</td></tr>'; }).join('');
       imprimirTabela("Fila Unificada", cabecalhos, linhasHTML);
    }
    function dispararImpressaoLogs() {
       if (!cacheLogsFiltrados || cacheLogsFiltrados.length === 0) return aviso("⚠️ Nenhum log para imprimir.");
       const linhasHTML = cacheLogsFiltrados.map(l => '<tr>' + l.htmlArr.map(cel => '<td>' + cel + '</td>').join('') + '</tr>').join('');
       imprimirTabela("Central de Logs Unificada", cacheLogsBase.colunas, linhasHTML);
    }

    function alternarTelas(telaIdAlvo) { ['tela-dashboard', 'tela-etapa', 'tela-ferramentas', 'tela-config', 'tela-logs', 'tela-cadastro', 'tela-tecnicos', 'tela-manual', 'tela-usuarios'].forEach(id => { const el = document.getElementById(id); if(!el) return; if (id === telaIdAlvo) { el.classList.remove('hidden'); el.classList.add('flex'); } else { el.classList.add('hidden'); el.classList.remove('flex'); } }); }
    function navegar(telaIdAlvo, btnElement) { if(btnElement) { document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active')); btnElement.classList.add('active'); } alternarTelas(telaIdAlvo); if(telaIdAlvo === 'tela-dashboard') carregarDashboard(); if(telaIdAlvo === 'tela-logs') carregarDadosDoLog(); if(telaIdAlvo === 'tela-config') carregarConfigs(); if(telaIdAlvo === 'tela-tecnicos') carregarTecnicos(); if(telaIdAlvo === 'tela-usuarios') carregarUsuarios(); }
    function navegarFila(btnElement) { document.getElementById('filtroFila').value = "pendentes"; document.getElementById('filtroEtapa').value = "todas"; document.getElementById('filtroTrava').value = "todos"; colunaOrdenacao = 'etapaNum'; ordemAscendente = true; selectionSet.clear(); contarChecksGlobais(); navegar('tela-etapa', btnElement); carregarFilaGeral(); }

    function carregarFilaGeral() {
      document.getElementById('loading-fila').classList.remove('hidden'); document.getElementById('tabela-fila').classList.add('hidden'); document.getElementById('paginacaoBox').classList.add('hidden');
      google.script.run.withSuccessHandler(dados => { if (dados && dados.erro) { document.getElementById('loading-fila').classList.add('hidden'); aviso("❌ " + dados.erro, 10000); return; } cacheFilaBase = dados; aplicarFiltrosEOrdenacao(); }).withFailureHandler(erro => { document.getElementById('loading-fila').classList.add('hidden'); aviso("❌ Erro Crítico: " + erro.message, 10000); }).solicitarDadosWeb('filaGeral');
    }

    function setSort(coluna) { if (colunaOrdenacao === coluna) ordemAscendente = !ordemAscendente; else { colunaOrdenacao = coluna; ordemAscendente = true; } document.querySelectorAll('.sort-icon').forEach(icon => { icon.innerHTML = ""; icon.parentElement.classList.remove('sort-active'); }); const ativo = document.getElementById(`sort-${coluna}`); if(ativo) { ativo.innerHTML = ordemAscendente ? "▲" : "▼"; ativo.parentElement.classList.add('sort-active'); } aplicarFiltrosEOrdenacao(); }
    
    function aplicarFiltrosEOrdenacao() {
      const fS = document.getElementById('filtroFila').value, fE = document.getElementById('filtroEtapa').value, fT = document.getElementById('filtroTrava').value;
      cacheFilaFiltrada = cacheFilaBase.filter(c => { if (fE !== "todas" && String(c.etapaNum) !== fE) return false; if (fT === "livres" && c.isTecnicoIndisp) return false; if (fT === "travados" && !c.isTecnicoIndisp) return false; if (fS === "pendentes") return !c.isEnviado && !c.isErroEmail && !c.isInativo; if (fS === "erros") return c.isErroEmail; if (fS === "inativos") return c.isInativo; if (fS === "enviados") return c.isEnviado; return true; });
      cacheFilaFiltrada.sort((a, b) => { if (colunaOrdenacao === 'dataPlanilha') return ordemAscendente ? getTimestamp(a.dataPlanilha) - getTimestamp(b.dataPlanilha) : getTimestamp(b.dataPlanilha) - getTimestamp(a.dataPlanilha); if (colunaOrdenacao === 'etapaNum') return ordemAscendente ? a.etapaNum - b.etapaNum : b.etapaNum - a.etapaNum; let valA = (a[colunaOrdenacao] || "").toString().toLowerCase(), valB = (b[colunaOrdenacao] || "").toString().toLowerCase(); if (valA < valB) return ordemAscendente ? -1 : 1; if (valA > valB) return ordemAscendente ? 1 : -1; return 0; });
      currentPage = 1; desenharTabelaFila();
    }

    function mudarPaginacao() { rowsPerPage = document.getElementById('selectRowsPerPage').value; currentPage = 1; desenharTabelaFila(); }
    function prevPage() { if (currentPage > 1) { currentPage--; desenharTabelaFila(); } }
    function nextPage() { const limit = rowsPerPage === 'todos' ? cacheFilaFiltrada.length : parseInt(rowsPerPage); if (currentPage * limit < cacheFilaFiltrada.length) { currentPage++; desenharTabelaFila(); } }
    function atualizarBoxPaginacao(s, e, t) { document.getElementById('paginacaoBox').classList.remove('hidden'); document.getElementById('pageInfo').innerText = `Mostrando ${t === 0 ? 0 : s + 1} a ${e} de ${t}`; document.getElementById('btnPrev').disabled = currentPage === 1; const l = rowsPerPage === 'todos' ? t : parseInt(rowsPerPage); document.getElementById('btnNext').disabled = currentPage * l >= t; }
    
    function criarToggle(campo, idUnico, chk, cor) { return `<div class="relative inline-block w-10 align-middle transition print:hidden"><input type="checkbox" onchange="salvarMarcacao('${idUnico}', '${campo}', this.checked)" ${chk ? "checked" : ""} class="toggle-checkbox absolute block w-5 h-5 rounded-full bg-white border-2 cursor-pointer"/><label class="toggle-label block h-5 rounded-full ${chk ? cor : 'bg-slate-300'} cursor-pointer"></label></div><span class="hidden print:inline-block font-bold">${chk ? 'SIM' : 'NÃO'}</span>`; }

    function salvarMarcacao(idUnico, campo, valorBooleano) {
      const lastDash = idUnico.lastIndexOf('-'); if (lastDash === -1) return; const abaNome = idUnico.substring(0, lastDash), linha = parseInt(idUnico.substring(lastDash + 1));
      const cli = cacheFilaBase.find(c => c.idUnico === idUnico); if (cli) { if (campo === 'fipeBaixa') cli.isFipeBaixa = valorBooleano; if (campo === 'tecnicoIndisp') cli.isTecnicoIndisp = valorBooleano; if (campo === 'respEmail') cli.isRespondeuEmail = valorBooleano; if (campo === 'respWhats') cli.isRespondeuWhats = valorBooleano; }
      aviso("⏳ Sincronizando...", 2000); google.script.run.withSuccessHandler(res => { aviso(res, 3000); aplicarFiltrosEOrdenacao(); }).withFailureHandler(err => aviso("❌ Erro: " + err.message, 5000)).atualizarMarcacaoWeb(abaNome, linha, campo, valorBooleano);
    }

    function abrirModalEdicaoCliente(idUnico) {
      const cli = cacheFilaBase.find(c => c.idUnico === idUnico); if(!cli) return;
      document.getElementById('ipt-edit-idUnico').value = idUnico; document.getElementById('ipt-edit-nome').value = cli.nome || ""; document.getElementById('ipt-edit-placa').value = cli.placa || ""; document.getElementById('ipt-edit-chassi').value = cli.chassi || ""; document.getElementById('ipt-edit-email').value = cli.email || ""; document.getElementById('ipt-edit-telefone').value = cli.telefone || ""; document.getElementById('ipt-edit-fipe').value = cli.fipe || ""; document.getElementById('modal-edicao-cliente').classList.remove('hidden');
    }
    function fecharModalEdicaoCliente() { document.getElementById('modal-edicao-cliente').classList.add('hidden'); }
    function salvarEdicaoCliente() {
      const idUnico = document.getElementById('ipt-edit-idUnico').value; const cli = cacheFilaBase.find(c => c.idUnico === idUnico); if(!cli) return;
      const payload = { nome: document.getElementById('ipt-edit-nome').value.trim(), placa: document.getElementById('ipt-edit-placa').value.trim(), chassi: document.getElementById('ipt-edit-chassi').value.trim(), email: document.getElementById('ipt-edit-email').value.trim(), telefone: document.getElementById('ipt-edit-telefone').value.trim(), fipe: document.getElementById('ipt-edit-fipe').value.trim() };
      const btn = document.getElementById('btn-salvar-edicao-cli'); btn.innerHTML = "⏳ Salvando..."; btn.disabled = true;
      google.script.run.withSuccessHandler(res => { aviso(res, 5000); btn.innerHTML = "💾 Salvar"; btn.disabled = false; fecharModalEdicaoCliente(); carregarFilaGeral(); }).withFailureHandler(err => { aviso("❌ " + err.message); btn.innerHTML = "💾 Salvar"; btn.disabled = false; }).web_atualizarDadosCliente(cli.abaNome, cli.linhaOriginal, payload);
    }

    function desenharTabelaFila() {
      const chkMaster = document.getElementById('chk-master'); if (chkMaster) chkMaster.checked = false;
      const corpo = document.getElementById('corpo-fila'); corpo.innerHTML = ""; const total = cacheFilaFiltrada.length;
      if(total === 0) { corpo.innerHTML = `<tr><td colspan="11" class="px-6 py-16 text-center text-slate-500 dark:text-slate-400 font-bold text-lg">Nenhum cliente atende a este filtro.</td></tr>`; document.getElementById('paginacaoBox').classList.add('hidden'); } 
      else {
        const limit = rowsPerPage === 'todos' ? total : parseInt(rowsPerPage), start = (currentPage - 1) * limit, end = Math.min(start + limit, total), pageData = cacheFilaFiltrada.slice(start, end);
        pageData.forEach((cli) => {
          let cNC = "text-slate-800 dark:text-slate-100", ab = "";
          if (cli.isInativo) { cNC = "text-purple-600 dark:text-purple-400 font-black"; ab = `<span class="bg-purple-100 dark:bg-purple-900/40 text-purple-800 dark:text-purple-300 px-2 py-1 rounded text-[10px] font-bold mr-1 print:border" title="${cli.notaNome}">INATIVO SGA</span>`; }
          let fE = cli.email || "-";
          if (cli.isErroEmail) { fE = `<span class="text-rose-600 dark:text-rose-400 font-bold flex items-center gap-1" title="${cli.notaEmail}">❌ ${cli.email}</span>`; ab += `<span class="bg-rose-100 dark:bg-rose-900/40 text-rose-800 dark:text-rose-300 px-2 py-1 rounded text-[10px] font-bold mr-1 print:border" title="${cli.notaEmail}">ERRO E-MAIL</span>`; }
          if (cli.isEnviado) ab += `<span class="bg-blue-100 dark:bg-blue-900/40 text-blue-800 dark:text-blue-300 px-2 py-1 rounded text-[10px] font-bold mr-1 print:border">E-MAIL ENVIADO</span>`;
          if (cli.isMoto) ab += `<span class="bg-emerald-200 dark:bg-emerald-900/60 text-emerald-900 dark:text-emerald-300 px-2 py-1 rounded text-[10px] font-bold mr-1 print:border">🏍️ MOTO</span>`;
          if (ab === "") ab = `<span class="text-slate-400 dark:text-slate-500 text-[10px] font-bold uppercase tracking-wider">Pendente</span>`;
          const rowCls = (cli.isEnviado && cli.isWhatsEnviado) ? "bg-slate-50 dark:bg-slate-800/40 opacity-60 grayscale-[30%]" : (cli.isMoto ? "linha-moto hover:brightness-95 dark:hover:brightness-110" : "hover:bg-indigo-50 dark:hover:bg-slate-700/50 bg-white dark:bg-darkcard table-row-anim");

       google.script.run
         .withSuccessHandler(res => {
            if (res.erro) {
               btn.innerText = "Salvar e Acessar"; btn.disabled = false; errBox.innerText = res.erro; errBox.classList.remove('hidden');
            } else {
               tempUserParaTroca.isDefault = false; // Remove a flag de bloqueio
               sessionStorage.setItem('sgcw_session', JSON.stringify(tempUserParaTroca));
               usuarioLogado = tempUserParaTroca;
               
               document.getElementById('modal-troca-senha').classList.add('hidden');
               document.getElementById('modal-troca-senha').classList.remove('flex');
               
               liberarAcesso(tempUserParaTroca);
            }
         })
         .withFailureHandler(err => { btn.innerText = "Salvar e Acessar"; btn.disabled = false; errBox.innerText = "Erro no servidor."; errBox.classList.remove('hidden'); })
         .web_alterarSenha(tempUserParaTroca.login, s1);
    }

    function liberarAcesso(usr) {
      const overlay = document.getElementById('tela-login-overlay'); overlay.style.opacity = '0'; setTimeout(() => overlay.classList.add('hidden'), 500);
      const dropResp = document.getElementById('bloco-responsavel');
      if (dropResp) { dropResp.innerHTML = `<input type="hidden" id="selectResponsavelFila" value="${usr.nome}"><span class="text-indigo-600 dark:text-indigo-400 font-black text-sm px-3 uppercase tracking-wider select-none">👤 ${usr.nome}</span>`; }
      
      // Controle de Acesso (Menu Admin)
      if (usr.nivel === 'ADMIN' || usr.nivel === 'ADMINISTRADOR') { document.getElementById('btn-nav-usuarios').classList.remove('hidden'); } 
      else { document.getElementById('btn-nav-usuarios').classList.add('hidden'); }
      
      navegar('tela-manual', document.getElementById('btn-nav-manual')); carregarFilaGeral();
    }

    window.onload = () => {
      if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) { document.documentElement.classList.add('dark'); document.getElementById('theme-icon').innerText = '☀️'; }
      
      const logado = checarSessaoAtiva(); 
      if (logado) {
          if (VIEW_PARAM === 'fila') { document.getElementById('sidebar').classList.add('hidden'); navegarFila(null); } 
          else if (VIEW_PARAM === 'dash') { document.getElementById('sidebar').classList.add('hidden'); navegar('tela-dashboard', null); } 
          else { navegar('tela-manual', document.getElementById('btn-nav-manual')); }
      }
      setTimeout(verificarStatusAPIs, 1000); 
    };

    function verificarStatusAPIs() {
      const dotHinova = document.getElementById('dot-hinova'), hoverHinova = document.getElementById('hover-hinova'), dotViaCep = document.getElementById('dot-viacep'), hoverViaCep = document.getElementById('hover-viacep');
      if(!dotHinova || !dotViaCep) return;
      dotHinova.className = "w-3 h-3 rounded-full bg-slate-400 animate-pulse shadow-sm cursor-wait"; hoverHinova.innerHTML = "<div class='flex items-center gap-2 mb-1'><span class='text-slate-400'>📡</span> <b>Hinova (SGA)</b></div><span class='text-slate-400'>Aguardando...</span>";
      dotViaCep.className = "w-3 h-3 rounded-full bg-slate-400 animate-pulse shadow-sm cursor-wait"; hoverViaCep.innerHTML = "<div class='flex items-center gap-2 mb-1'><span class='text-slate-400'>📮</span> <b>ViaCEP</b></div><span class='text-slate-400'>Aguardando...</span>";

      const startViaCep = performance.now();
      fetch('https://viacep.com.br/ws/01001000/json/').then(res => { const t = Math.round(performance.now() - startViaCep); if (res.ok) { dotViaCep.className = "w-3 h-3 rounded-full bg-emerald-500 shadow-md shadow-emerald-500/40"; hoverViaCep.innerHTML = `<div class='flex items-center gap-2 mb-1'><span class='text-emerald-400'>🟢</span> <b>ViaCEP Online</b></div><div class='mt-2 text-[10px] text-emerald-400/70 font-mono'>Ping: ${t}ms</div>`; } else throw new Error(res.status); }).catch(e => { dotViaCep.className = "w-3 h-3 rounded-full bg-rose-500 shadow-md shadow-rose-500/40 animate-bounce"; hoverViaCep.innerHTML = `<div class='flex items-center gap-2 mb-1'><span class='text-rose-500'>🔴</span> <b>ViaCEP Offline</b></div>`; });
      google.script.run.withSuccessHandler(res => { if (res && res.hinova) { dotHinova.className = "w-3 h-3 rounded-full bg-emerald-500 shadow-md shadow-emerald-500/40"; hoverHinova.innerHTML = `<div class='flex items-center gap-2 mb-1'><span class='text-emerald-400'>🟢</span> <b>Hinova (SGA)</b></div><div class='mt-2 text-[10px] text-emerald-400/70 font-mono'>Ping: ${res.tempo}ms</div>`; } else { dotHinova.className = "w-3 h-3 rounded-full bg-rose-500 shadow-md shadow-rose-500/40 animate-bounce"; hoverHinova.innerHTML = `<div class='flex items-center gap-2 mb-1'><span class='text-rose-500'>🔴</span> <b>Hinova Falhou</b></div>`; } }).web_testarAPIs();
    }
</script>
